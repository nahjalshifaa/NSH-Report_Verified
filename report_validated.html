<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Validation Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 420px;
            text-align: center;
            padding: 2rem 1.5rem;
            background: #fff;
        }
        .card img { width: 180px; margin-bottom: 20px; }
        .card-title { font-weight: 700; color: #2e7d32; }
        .status-text { font-size: 1.1rem; color: #388e3c; font-weight: 500; }
        footer { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #4caf50; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <img src="Reports_Validation.png" alt="Report Validated">
    <h3 class="card-title">Report Validation</h3>
    <p class="status-text">✅ The report has been successfully validated and confirmed.</p>
    <hr>
    <p class="text-muted" id="timestamp"></p>
</div>

<footer>
    &copy; <span id="year"></span> Report Validation System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('timestamp').textContent = 'Timestamp: ' + new Date().toISOString().slice(0,19).replace('T',' ');
document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
