<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Validation Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #eaf7ec, #d7ecd6);
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .brand-logo{ width:70px; height:70px; border-radius: 14px; background:#fff; padding:6px; object-fit:contain; box-shadow: 0 4px 14px rgba(0,0,0,0.08); margin-bottom: 14px; }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 420px;
            text-align: center;
            padding: 2rem 1.5rem;
            background: #fff;
        }
        .card img.stamp { width: 160px; margin-bottom: 20px; }
        .card-title { font-weight: 700; color: #1f7a2e; }
        .status-text { font-size: 1.1rem; color: #2e9b39; font-weight: 500; }
        footer { margin-top: 16px; text-align: center; color: #2e9b39; font-size: 0.9rem; }
    </style>
<link rel="icon" type="image/jpeg" href="img/logo.jpg">
</head>
<body>

<img src="img/logo.jpg" alt="Nahj Al-Shifaa General Medical Complex" class="brand-logo">

<div class="card">
    <img src="Reports_Validation.png" alt="Report Validated" class="stamp">
    <h3 class="card-title">Report Validation</h3>
    <p class="status-text">✅ The report has been successfully validated and confirmed.</p>
    <hr>
    <p class="text-muted" id="timestamp"></p>
</div>

<footer>
    &copy; <span id="year"></span> Report Validation System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/whatsapp.js"></script>
<script>
document.getElementById('timestamp').textContent = 'Timestamp: ' + new Date().toISOString().slice(0,19).replace('T',' ');
document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
