<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تصدير Excel</title>
</head>
<body>
<p id="msg">... جاري التصدير</p>
<script>
function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
}

const results = JSON.parse(sessionStorage.getItem('nsh_export_results') || '[]');

if (!results.length) {
    document.getElementById('msg').textContent = 'لا توجد نتائج لتصديرها.';
} else {
    let html = '<table border="1"><tr>'
        + '<th>رقم الباسبور</th><th>الاسم بالعربي</th><th>English Name</th>'
        + '<th>رقم التليفون</th><th>تاريخ التقرير</th><th>حالة التقرير</th></tr>';
    results.forEach(r => {
        html += `<tr><td>${escapeHtml(r.passport)}</td><td>${escapeHtml(r.name_ar)}</td>`
            + `<td>${escapeHtml(r.name_en)}</td><td>${escapeHtml(r.phone)}</td>`
            + `<td>${escapeHtml(r.report_date)}</td><td>${escapeHtml(r.report_status)}</td></tr>`;
    });
    html += '</table>';

    const blob = new Blob(['\ufeff' + html], { type: 'application/vnd.ms-excel;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'search_results.xls';
    document.body.appendChild(a);
    a.click();

    sessionStorage.removeItem('nsh_export_results');
    document.getElementById('msg').textContent = 'تم تحميل الملف. يمكنك إغلاق هذه الصفحة.';
}
</script>
</body>
</html>
