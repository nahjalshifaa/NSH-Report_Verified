<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script>(function(){var l=localStorage.getItem('nsh_lang')||'ar';document.documentElement.lang=l;document.documentElement.dir=(l==='ar'?'rtl':'ltr');})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة البحث</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f7a2e">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/jpeg" href="img/logo.jpg">
</head>
<body data-i18n-doctitle="result.title">

<header class="site-header">
    <img src="img/logo.jpg" alt="مجمع نهج الشفاء الطبي العام" class="logo-img">
    <div class="brand-text">
        <strong data-i18n="common.orgName">مجمع نهج الشفاء الطبي العام</strong>
        <span data-i18n="view.subtitle">نظام التحقق من التقارير</span>
    </div>
</header>

<div class="container medium" id="resultsContainer">
<h2 data-i18n="result.title">نتائج البحث</h2>
<p data-i18n="result.searching">... جاري البحث</p>
</div>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/footer.js"></script>
<script src="js/pwa.js"></script>
<script>
let lastResults = [];

function confettiHtml(){
    const colors = ['#2e9b39','#4f86b5','#e0863b','#7cbb3f','#ffd166'];
    let html = '';
    for (let i = 0; i < 16; i++){
        const angle = (Math.PI * 2 * i) / 16;
        const dist = 55 + Math.random() * 35;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;
        const rot = Math.floor(Math.random() * 360);
        const color = colors[i % colors.length];
        const delay = (Math.random() * 0.15).toFixed(2);
        html += `<span class="confetti-piece" style="--dx:${dx}px; --dy:${dy}px; --rot:${rot}deg; background:${color}; animation-delay:${delay}s;"></span>`;
    }
    return html;
}

function exportResultsToExcel(){
    exportArrayToExcel(lastResults, [
        { key: 'passport', label: t('th.passport') },
        { key: 'name_ar', label: t('th.nameAr') },
        { key: 'name_en', label: t('th.nameEn') },
        { key: 'phone', label: t('th.phone') },
        { key: 'report_date', label: t('th.reportDate') },
        { key: 'report_status', label: t('th.status') }
    ], 'search_results.xls');
}

async function run(){
    const params = new URLSearchParams(window.location.search);
    const passport = (params.get('passport') || '').trim();
    const report_date = (params.get('report_date') || '').trim();
    const phone = (params.get('phone') || '').trim();

    const data = await sheetsGetData();

    // رقم الباسبور/الإقامة هو الأساس الوحيد المطلوب للبحث.
    // التاريخ والتليفون بيستخدموا بس لو المستخدم دخّلهم، لتضييق النتائج.
    let results = data.filter(r => String(r.passport).trim() === passport);

    let narrowedByDate = false, narrowedByPhone = false;
    if (report_date) {
        const byDate = results.filter(r => String(r.report_date) === report_date);
        if (byDate.length) { results = byDate; narrowedByDate = true; }
    }
    if (phone) {
        const byPhone = results.filter(r => String(r.phone).trim() === phone);
        if (byPhone.length) { results = byPhone; narrowedByPhone = true; }
    }

    // أحدث تقرير أولًا
    results.sort((a,b) => String(b.report_date).localeCompare(String(a.report_date)));

    lastResults = results;

    const container = document.getElementById('resultsContainer');
    const printHeader = `
        <div class="print-logo-header">
            <img src="img/logo.jpg" alt="مجمع نهج الشفاء الطبي العام" style="height:40px;">
            <strong data-i18n="common.orgName">مجمع نهج الشفاء الطبي العام</strong>
        </div>`;
    if (results.length > 0) {
        let html = printHeader + `<h2>${t('result.title')}</h2>`;
        if (results.length > 1) {
            html += `<p style="color:var(--text-muted);font-size:14px;text-align:center;">${t('result.matchCount', { n: results.length })}</p>`;
        }
        results.forEach(report => {
            const isValid = report.report_status === 'valid';
            const iconClass = isValid ? 'is-valid' : 'is-invalid';
            const statusText = isValid ? t('result.statusValid') : t('result.statusNotValid');
            html += `
            <div class="report-card">
                <div class="result-stamp-wrap">
                    <div class="result-icon-circle ${iconClass}">
                        ${isValid ? '✔' : '✕'}
                        ${isValid ? confettiHtml() : ''}
                    </div>
                    <div class="result-status-text ${iconClass}">${statusText}</div>
                </div>
                <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
                <p><span class="label">${t('result.labelPassport')}</span> ${escapeHtml(report.passport)}</p>
                <p><span class="label">${t('result.labelNameAr')}</span> ${escapeHtml(report.name_ar)}</p>
                <p><span class="label">${t('result.labelNameEn')}</span> ${escapeHtml(report.name_en)}</p>
                <p><span class="label">${t('result.labelPhone')}</span> ${escapeHtml(report.phone)}</p>
                <p><span class="label">${t('result.labelDate')}</span> ${escapeHtml(report.report_date)}</p>
            </div>`;
        });
        html += `
        <div class="button-group">
            <button class="search-again" onclick="window.location.href='view.html'">${t('result.searchAgain')}</button>
            <button class="print-btn" onclick="window.print()">${t('result.print')}</button>
            <button class="export-btn" onclick="exportResultsToExcel()">${t('result.exportExcel')}</button>
        </div>`;
        container.innerHTML = html;
    } else {
        const anyForPassport = data.some(r => String(r.passport).trim() === passport);
        let msg;
        if (!anyForPassport) {
            msg = t('result.noResultNotFound');
        } else if (report_date || phone) {
            msg = t('result.noResultNarrowed');
        } else {
            msg = t('result.noResultGeneric');
        }
        container.innerHTML = `
        <h2>${t('result.title')}</h2>
        <p class="no-result">${msg}</p>
        <button class="search-again" onclick="window.location.href='view.html'">${t('result.searchAgain')}</button>`;
    }
}
run();
window.addEventListener('nsh:langchange', run);
</script>
</body>
</html>
