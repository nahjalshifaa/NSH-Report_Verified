<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة البحث</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f7a2e">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/jpeg" href="img/logo.jpg">
</head>
<body>

<header class="site-header">
    <img src="img/logo.jpg" alt="مجمع نهج الشفاء الطبي العام" class="logo-img">
    <div class="brand-text">
        <strong>مجمع نهج الشفاء الطبي العام</strong>
        <span>نظام التحقق من التقارير</span>
    </div>
</header>

<div class="container medium" id="resultsContainer">
<h2>نتائج البحث</h2>
<p>... جاري البحث</p>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/footer.js"></script>
<script src="js/pwa.js"></script>
<script>
let lastResults = [];

function confettiHtml(){
    const colors = ['#2e9b39','#4f86b5','#e0863b','#7cbb3f','#ffd166'];
    let html = '';
    for (let i = 0; i < 16; i++){
        const angle = (Math.PI * 2 * i) / 16;
        const dist = 55 + Math.random() * 35;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;
        const rot = Math.floor(Math.random() * 360);
        const color = colors[i % colors.length];
        const delay = (Math.random() * 0.15).toFixed(2);
        html += `<span class="confetti-piece" style="--dx:${dx}px; --dy:${dy}px; --rot:${rot}deg; background:${color}; animation-delay:${delay}s;"></span>`;
    }
    return html;
}

function exportResultsToExcel(){
    exportArrayToExcel(lastResults, [
        { key: 'passport', label: 'رقم الباسبور' },
        { key: 'name_ar', label: 'الاسم بالعربي' },
        { key: 'name_en', label: 'English Name' },
        { key: 'phone', label: 'رقم التليفون' },
        { key: 'report_date', label: 'تاريخ التقرير' },
        { key: 'report_status', label: 'حالة التقرير' }
    ], 'search_results.xls');
}

async function run(){
    const params = new URLSearchParams(window.location.search);
    const passport = (params.get('passport') || '').trim();
    const report_date = (params.get('report_date') || '').trim();
    const phone = (params.get('phone') || '').trim();

    const data = await sheetsGetData();

    // رقم الباسبور/الإقامة هو الأساس الوحيد المطلوب للبحث.
    // التاريخ والتليفون بيستخدموا بس لو المستخدم دخّلهم، لتضييق النتائج.
    let results = data.filter(r => String(r.passport).trim() === passport);

    let narrowedByDate = false, narrowedByPhone = false;
    if (report_date) {
        const byDate = results.filter(r => String(r.report_date) === report_date);
        if (byDate.length) { results = byDate; narrowedByDate = true; }
    }
    if (phone) {
        const byPhone = results.filter(r => String(r.phone).trim() === phone);
        if (byPhone.length) { results = byPhone; narrowedByPhone = true; }
    }

    // أحدث تقرير أولًا
    results.sort((a,b) => String(b.report_date).localeCompare(String(a.report_date)));

    lastResults = results;

    const container = document.getElementById('resultsContainer');
    const printHeader = `
        <div class="print-logo-header">
            <img src="img/logo.jpg" alt="مجمع نهج الشفاء الطبي العام" style="height:40px;">
            <strong>مجمع نهج الشفاء الطبي العام</strong>
        </div>`;
    if (results.length > 0) {
        let html = printHeader + '<h2>نتائج البحث</h2>';
        if (results.length > 1) {
            html += `<p style="color:var(--text-muted);font-size:14px;text-align:center;">تم العثور على ${results.length} تقرير مطابق لرقم الباسبور/الإقامة.</p>`;
        }
        results.forEach(report => {
            const isValid = report.report_status === 'valid';
            const iconClass = isValid ? 'is-valid' : 'is-invalid';
            const statusText = isValid ? 'Report Valid' : 'Report Not Valid';
            html += `
            <div class="report-card">
                <div class="result-stamp-wrap">
                    <div class="result-icon-circle ${iconClass}">
                        ${isValid ? '✔' : '✕'}
                        ${isValid ? confettiHtml() : ''}
                    </div>
                    <div class="result-status-text ${iconClass}">${statusText}</div>
                </div>
                <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
                <p><span class="label">رقم الباسبور:</span> ${escapeHtml(report.passport)}</p>
                <p><span class="label">الاسم عربي:</span> ${escapeHtml(report.name_ar)}</p>
                <p><span class="label">English Name:</span> ${escapeHtml(report.name_en)}</p>
                <p><span class="label">رقم التليفون:</span> ${escapeHtml(report.phone)}</p>
                <p><span class="label">تاريخ التقرير:</span> ${escapeHtml(report.report_date)}</p>
            </div>`;
        });
        html += `
        <div class="button-group">
            <button class="search-again" onclick="window.location.href='view.html'">بحث مرة أخرى</button>
            <button class="print-btn" onclick="window.print()">🖨️ طباعة</button>
            <button class="export-btn" onclick="exportResultsToExcel()">📁 تصدير Excel</button>
        </div>`;
        container.innerHTML = html;
    } else {
        const anyForPassport = data.some(r => String(r.passport).trim() === passport);
        let msg;
        if (!anyForPassport) {
            msg = 'لا يوجد أي تقرير مسجّل بهذا الرقم. تأكد من رقم الباسبور/الإقامة وحاول مرة أخرى.';
        } else if (report_date || phone) {
            msg = 'يوجد تقرير بهذا الرقم، لكن لا يوجد ما يطابق التاريخ و/أو رقم التليفون اللي دخلتهم. جرّب البحث برقم الباسبور فقط.';
        } else {
            msg = 'لا توجد نتائج مطابقة للبحث.';
        }
        container.innerHTML = `
        <h2>نتائج البحث</h2>
        <p class="no-result">${msg}</p>
        <button class="search-again" onclick="window.location.href='view.html'">بحث مرة أخرى</button>`;
    }
}
run();
</script>
</body>
</html>
