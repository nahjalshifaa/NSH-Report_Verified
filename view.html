<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بحث التقرير</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<a href="index.html" class="back-btn">⬅️ الرجوع لتسجيل الدخول</a>

<div class="container medium">
<h2>بحث عن التقرير</h2>
<form id="searchForm">
<label>رقم الباسبور أو الإقامة:</label>
<input type="text" id="passport" required>

<label>تاريخ التقرير:</label>
<input type="date" id="report_date" required>

<label>رقم التليفون (اختياري):</label>
<input type="text" id="phone">

<br>
<button type="submit">بحث</button>
</form>
</div>

<script>
document.getElementById('report_date').value = new Date().toISOString().slice(0,10);

document.getElementById('searchForm').addEventListener('submit', function(e){
    e.preventDefault();
    const passport = document.getElementById('passport').value.trim();
    const report_date = document.getElementById('report_date').value;
    const phone = document.getElementById('phone').value.trim();
    const params = new URLSearchParams({ passport, report_date, phone });
    window.location.href = 'report_result.html?' + params.toString();
});
</script>

</body>
</html>
