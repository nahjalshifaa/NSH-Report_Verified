<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container narrow">
<h2>تسجيل الدخول</h2>

<p id="error" class="error" style="display:none;"></p>

<form id="loginForm">
<input type="text" id="username" placeholder="اسم المستخدم" required>
<input type="password" id="password" placeholder="كلمة المرور" required>
<br>
<button type="submit">دخول</button>
</form>

<a href="view.html" class="check-link">🔍 التحقق من النتيجة</a>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
// لو المستخدم مسجل دخول بالفعل، يروح على الداشبورد مباشرة
if (getSession()) window.location.href = 'dashboard.html';

document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    errorEl.style.display = 'none';

    const submitBtn = e.target.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.textContent = '... جاري الدخول';

    const users = await sheetsGetUsers();
    const match = users.find(u => u.username == username && u.password == password);

    if (match) {
        setSession(username, match.role);
        window.location.href = 'dashboard.html';
    } else {
        errorEl.textContent = '⚠️ اسم المستخدم أو كلمة المرور غير صحيحة!';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'دخول';
    }
});
</script>

</body>
</html>
