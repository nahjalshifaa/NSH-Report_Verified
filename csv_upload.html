<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script>(function(){var l=localStorage.getItem('nsh_lang')||'ar';document.documentElement.lang=l;document.documentElement.dir=(l==='ar'?'rtl':'ltr');})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع ملف CSV</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f7a2e">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/jpeg" href="img/logo.jpg">
</head>
<body data-i18n-doctitle="csv.title">

<header class="site-header">
    <img src="img/logo.jpg" alt="مجمع نهج الشفاء الطبي العام" class="logo-img">
    <div class="brand-text">
        <strong data-i18n="common.orgName">مجمع نهج الشفاء الطبي العام</strong>
        <span data-i18n="csv.subtitle">رفع بيانات التقارير</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-actions">
        <a href="#" class="logout-btn" onclick="logout(); return false;" data-i18n="nav.logout">⎋ تسجيل الخروج</a>
    </div>
</header>

<div class="container">
<h2 data-i18n="csv.title">رفع ملف CSV وإضافة البيانات</h2>

<p id="successMsg" class="success" style="display:none;"></p>

<a href="csv_example.csv" class="download-btn" download data-i18n="csv.downloadTemplate">📥 تحميل نموذج CSV</a>

<form id="uploadForm" style="margin-top:15px;">
    <input type="file" id="csv_file" accept=".csv" required>
    <button type="submit" class="confirm-btn" data-i18n="csv.uploadBtn">رفع الملف</button>
</form>

<div id="previewSection" style="display:none;">
<h3 data-i18n="csv.previewTitle">معاينة البيانات قبل الإضافة</h3>
<div class="table-wrap">
<table id="previewTable">
<tr>
<th data-i18n="th.passport">رقم الباسبور</th><th data-i18n="th.nameAr">الاسم بالعربي</th><th data-i18n="th.nameEn">English Name</th>
<th data-i18n="th.phone">رقم التليفون</th><th data-i18n="th.reportDate">تاريخ التقرير</th><th data-i18n="th.status">حالة التقرير</th><th data-i18n="th.delete">حذف</th>
</tr>
</table>
</div>

<button id="confirmUploadBtn" class="confirm-btn" data-i18n="csv.confirmBtn">✅ تأكيد إضافة البيانات</button>
</div>

<br><br>
<a href="dashboard.html" class="back-btn" data-i18n="nav.backDashboard">⬅ العودة للداش بورد</a>
</div>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/footer.js"></script>
<script src="js/pwa.js"></script>
<script>
requireLogin();

let csvData = JSON.parse(sessionStorage.getItem('nsh_csv_data') || '[]');

function parseCSVLine(line){
    // معالجة بسيطة لأسطر CSV (تدعم الفواصل العادية والاقتباسات البسيطة)
    const result = [];
    let cur = '', inQuotes = false;
    for (let i=0; i<line.length; i++){
        const c = line[i];
        if (c === '"') { inQuotes = !inQuotes; continue; }
        if (c === ',' && !inQuotes) { result.push(cur); cur=''; continue; }
        cur += c;
    }
    result.push(cur);
    return result;
}

function renderPreview(){
    const section = document.getElementById('previewSection');
    if (!csvData.length) {
        section.style.display = 'none';
        return;
    }
    section.style.display = 'block';
    const table = document.getElementById('previewTable');
    let html = `<tr><th>${t('th.passport')}</th><th>${t('th.nameAr')}</th><th>${t('th.nameEn')}</th>
        <th>${t('th.phone')}</th><th>${t('th.reportDate')}</th><th>${t('th.status')}</th><th>${t('th.delete')}</th></tr>`;
    csvData.forEach((row, index) => {
        html += `<tr>
            <td>${escapeHtml(row.passport)}</td>
            <td>${escapeHtml(row.name_ar)}</td>
            <td>${escapeHtml(row.name_en)}</td>
            <td>${escapeHtml(row.phone)}</td>
            <td>${escapeHtml(row.report_date)}</td>
            <td>${escapeHtml(row.report_status)}</td>
            <td><a href="#" class="delete-btn" style="text-decoration:none;padding:4px 8px;" onclick="deleteCsvRow(${index}); return false;">${t('th.delete')}</a></td>
        </tr>`;
    });
    table.innerHTML = html;
}

function deleteCsvRow(index){
    if (!confirm(t('csv.confirmDeleteRow'))) return;
    csvData.splice(index, 1);
    sessionStorage.setItem('nsh_csv_data', JSON.stringify(csvData));
    renderPreview();
}

document.getElementById('uploadForm').addEventListener('submit', function(e){
    e.preventDefault();
    const file = document.getElementById('csv_file').files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt){
        const lines = evt.target.result.split(/\r?\n/).filter(l => l.trim() !== '');
        csvData = [];
        lines.forEach((line, i) => {
            if (i === 0) return; // تجاهل صف العناوين
            const row = parseCSVLine(line);
            csvData.push({
                passport: row[0] || '',
                name_ar: row[1] || '',
                name_en: row[2] || '',
                phone: row[3] || '',
                report_date: row[4] || '',
                report_status: row[5] || 'valid'
            });
        });
        sessionStorage.setItem('nsh_csv_data', JSON.stringify(csvData));
        renderPreview();
        showToast(t('csv.extractSuccess', { n: csvData.length }));
    };
    reader.readAsText(file, 'UTF-8');
});

document.getElementById('confirmUploadBtn').addEventListener('click', async function(){
    const data = await sheetsGetData();
    const merged = data.concat(csvData);
    const ok = await sheetsSaveData(merged);
    const el = document.getElementById('successMsg');
    if (ok) {
        csvData = [];
        sessionStorage.removeItem('nsh_csv_data');
        renderPreview();
        el.textContent = t('csv.addSuccess');
        el.className = 'success';
    } else {
        el.textContent = t('csv.addFailed');
        el.className = 'error';
    }
    el.style.display = 'block';
});

renderPreview();
window.addEventListener('nsh:langchange', renderPreview);
</script>

</body>
</html>
